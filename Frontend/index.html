<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>SmartFridge</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,300&display=swap" rel="stylesheet"/>
<script src="https://unpkg.com/react@18/umd/react.development.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg-void:#050810;
  --bg-deep:#080d1a;
  --bg-surface:#0d1526;
  --bg-glass:rgba(13,21,38,0.6);
  --bg-glass-hover:rgba(20,32,58,0.7);
  --border-glass:rgba(99,157,255,0.12);
  --border-glow:rgba(99,157,255,0.3);
  --mint:#00e5a0;
  --mint-dim:rgba(0,229,160,0.15);
  --mint-glow:rgba(0,229,160,0.35);
  --amber:#f59e0b;
  --amber-dim:rgba(245,158,11,0.15);
  --coral:#ff4d6d;
  --coral-dim:rgba(255,77,109,0.15);
  --coral-glow:rgba(255,77,109,0.35);
  --blue:#639dff;
  --blue-dim:rgba(99,157,255,0.12);
  --text-prime:#e8edf8;
  --text-sec:#8a9bbf;
  --text-muted:#4a5878;
  --font-display:'Syne',sans-serif;
  --font-body:'DM Sans',sans-serif;
  --r-sm:8px;--r-md:14px;--r-lg:20px;--r-xl:28px;
}
html,body,#root{height:100%;background:var(--bg-void);color:var(--text-prime);font-family:var(--font-body);overflow-x:hidden}
::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:rgba(99,157,255,0.2);border-radius:2px}

/* Glass utility */
.glass{
  background:var(--bg-glass);
  border:1px solid var(--border-glass);
  backdrop-filter:blur(20px);
  -webkit-backdrop-filter:blur(20px);
}
.glass-bright{
  background:rgba(20,32,58,0.75);
  border:1px solid rgba(99,157,255,0.18);
  backdrop-filter:blur(24px);
}

/* Noise overlay */
body::before{
  content:'';position:fixed;inset:0;
  background:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.035'/%3E%3C/svg%3E");
  pointer-events:none;z-index:0;opacity:0.6;
}

/* Orb backgrounds */
.orb{position:fixed;border-radius:50%;filter:blur(80px);pointer-events:none;z-index:0}
.orb-1{width:600px;height:600px;top:-200px;right:-100px;background:radial-gradient(circle,rgba(99,157,255,0.07) 0%,transparent 70%)}
.orb-2{width:500px;height:500px;bottom:-150px;left:-100px;background:radial-gradient(circle,rgba(0,229,160,0.05) 0%,transparent 70%)}
.orb-3{width:400px;height:400px;top:40%;left:30%;background:radial-gradient(circle,rgba(255,77,109,0.04) 0%,transparent 70%)}

/* Layout */
.app-shell{position:relative;z-index:1;min-height:100vh;display:flex;flex-direction:column}
.topbar{
  position:sticky;top:0;z-index:100;
  padding:0 24px;height:64px;
  display:flex;align-items:center;justify-content:space-between;
  background:rgba(5,8,16,0.8);
  border-bottom:1px solid var(--border-glass);
  backdrop-filter:blur(30px);
}
.logo{font-family:var(--font-display);font-size:20px;font-weight:700;letter-spacing:-0.5px;display:flex;align-items:center;gap:8px}
.logo-icon{width:32px;height:32px;border-radius:10px;background:linear-gradient(135deg,var(--mint),var(--blue));display:flex;align-items:center;justify-content:center;font-size:16px}
.logo span{background:linear-gradient(90deg,var(--mint),var(--blue));-webkit-background-clip:text;-webkit-text-fill-color:transparent}

.nav-tabs{display:flex;gap:4px;background:rgba(13,21,38,0.6);padding:4px;border-radius:12px;border:1px solid var(--border-glass)}
.nav-tab{padding:7px 16px;border-radius:9px;border:none;background:transparent;color:var(--text-sec);font-family:var(--font-body);font-size:13px;font-weight:500;cursor:pointer;transition:all 0.2s;white-space:nowrap;display:flex;align-items:center;gap:6px}
.nav-tab:hover{color:var(--text-prime);background:rgba(99,157,255,0.08)}
.nav-tab.active{background:rgba(99,157,255,0.15);color:var(--blue);border:1px solid rgba(99,157,255,0.2)}
.nav-tab svg{width:14px;height:14px;flex-shrink:0}

.main{flex:1;padding:28px 24px;max-width:1200px;margin:0 auto;width:100%}

/* Inventory */
.inv-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:24px;flex-wrap:wrap;gap:12px}
.inv-title{font-family:var(--font-display);font-size:28px;font-weight:700;letter-spacing:-1px}
.inv-title span{color:var(--mint)}

.controls{display:flex;gap:10px;align-items:center;flex-wrap:wrap}
.search-wrap{position:relative}
.search-wrap svg{position:absolute;left:12px;top:50%;transform:translateY(-50%);width:15px;height:15px;color:var(--text-muted)}
.search-input{
  background:var(--bg-glass);border:1px solid var(--border-glass);
  color:var(--text-prime);font-family:var(--font-body);font-size:13px;
  padding:9px 14px 9px 36px;border-radius:10px;width:220px;
  outline:none;transition:all 0.2s;
}
.search-input:focus{border-color:rgba(99,157,255,0.3);background:rgba(20,32,58,0.7)}
.search-input::placeholder{color:var(--text-muted)}
.sort-select{
  background:var(--bg-glass);border:1px solid var(--border-glass);
  color:var(--text-sec);font-family:var(--font-body);font-size:13px;
  padding:9px 14px;border-radius:10px;outline:none;cursor:pointer;
}
.sort-select option{background:var(--bg-surface);color:var(--text-prime)}
.refresh-btn{
  padding:9px 14px;border-radius:10px;background:var(--bg-glass);
  border:1px solid var(--border-glass);color:var(--text-sec);cursor:pointer;
  font-size:13px;font-family:var(--font-body);display:flex;align-items:center;gap:6px;
  transition:all 0.2s;
}
.refresh-btn:hover{color:var(--blue);border-color:rgba(99,157,255,0.3)}
.refresh-btn svg{width:14px;height:14px}

/* Item grid */
.item-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:16px}

.item-card{
  background:var(--bg-glass);border:1px solid var(--border-glass);
  border-radius:var(--r-lg);overflow:hidden;
  transition:all 0.25s cubic-bezier(0.4,0,0.2,1);
  position:relative;cursor:default;
  animation:fadeSlideIn 0.4s ease both;
}
.item-card:hover{
  transform:translateY(-4px);
  border-color:rgba(99,157,255,0.25);
  background:var(--bg-glass-hover);
  box-shadow:0 20px 40px rgba(0,0,0,0.4),0 0 0 1px rgba(99,157,255,0.1);
}
@keyframes fadeSlideIn{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:none}}

.card-img{width:100%;height:130px;object-fit:cover;display:block}
.card-img-fallback{
  width:100%;height:130px;
  display:flex;align-items:center;justify-content:center;
  font-size:40px;
  background:linear-gradient(135deg,rgba(13,21,38,0.9),rgba(8,13,26,0.95));
  border-bottom:1px solid var(--border-glass);
}
.card-body{padding:14px}
.card-name{font-family:var(--font-display);font-size:15px;font-weight:600;margin-bottom:10px;letter-spacing:-0.3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.card-meta{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.expiry-date{font-size:12px;color:var(--text-muted);margin:-5px 0 12px}

.expiry-badge{
  font-size:11px;font-weight:600;letter-spacing:0.3px;
  padding:4px 9px;border-radius:20px;
  display:flex;align-items:center;gap:4px;
}
.badge-fresh{background:rgba(0,229,160,0.12);color:var(--mint);border:1px solid rgba(0,229,160,0.25)}
.badge-warn{background:rgba(245,158,11,0.12);color:var(--amber);border:1px solid rgba(245,158,11,0.25)}
.badge-critical{background:rgba(255,77,109,0.12);color:var(--coral);border:1px solid rgba(255,77,109,0.25)}
.badge-dot{width:5px;height:5px;border-radius:50%;flex-shrink:0}
.badge-fresh .badge-dot{background:var(--mint);box-shadow:0 0 6px var(--mint-glow)}
.badge-warn .badge-dot{background:var(--amber)}
.badge-critical .badge-dot{background:var(--coral);box-shadow:0 0 6px var(--coral-glow);animation:pulse 1.5s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.4}}

.qty-controls{display:flex;align-items:center;gap:8px}
.qty-btn{
  width:26px;height:26px;border-radius:7px;border:1px solid var(--border-glass);
  background:rgba(99,157,255,0.06);color:var(--blue);cursor:pointer;
  display:flex;align-items:center;justify-content:center;font-size:16px;line-height:1;
  transition:all 0.15s;font-family:var(--font-body);
}
.qty-btn:hover{background:rgba(99,157,255,0.15);border-color:rgba(99,157,255,0.3)}
.qty-val{font-size:14px;font-weight:500;min-width:24px;text-align:center;color:var(--text-prime)}

.card-actions{display:flex;gap:8px}
.del-btn{
  margin-left:auto;width:30px;height:30px;border-radius:8px;
  border:1px solid rgba(255,77,109,0.15);background:rgba(255,77,109,0.06);
  color:rgba(255,77,109,0.6);cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  transition:all 0.2s;
}
.del-btn:hover{background:rgba(255,77,109,0.15);color:var(--coral);border-color:rgba(255,77,109,0.3)}
.del-btn svg{width:13px;height:13px}

/* Empty state */
.empty-state{
  text-align:center;padding:80px 20px;
  display:flex;flex-direction:column;align-items:center;gap:16px;
}
.empty-icon{
  width:96px;height:96px;border-radius:28px;
  background:rgba(99,157,255,0.06);border:1px solid var(--border-glass);
  display:flex;align-items:center;justify-content:center;font-size:44px;
  animation:float 3s ease-in-out infinite;
}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
.empty-title{font-family:var(--font-display);font-size:22px;font-weight:700;color:var(--text-prime)}
.empty-sub{color:var(--text-sec);font-size:14px;max-width:300px;line-height:1.6}
.primary-btn{
  padding:11px 24px;border-radius:11px;border:none;cursor:pointer;
  background:linear-gradient(135deg,var(--mint),rgba(0,180,120,0.9));
  color:#020d08;font-family:var(--font-body);font-size:14px;font-weight:600;
  transition:all 0.2s;letter-spacing:0.1px;
}
.primary-btn:hover{transform:translateY(-1px);box-shadow:0 8px 24px var(--mint-glow)}

/* Scanner */
.scanner-wrap{max-width:600px;margin:0 auto}
.scanner-title{font-family:var(--font-display);font-size:28px;font-weight:700;letter-spacing:-1px;margin-bottom:6px}
.scanner-sub{color:var(--text-sec);font-size:14px;margin-bottom:28px}

.drop-zone{
  border:2px dashed rgba(99,157,255,0.2);border-radius:var(--r-xl);
  padding:48px 24px;text-align:center;cursor:pointer;
  transition:all 0.25s;position:relative;overflow:hidden;
  background:rgba(13,21,38,0.4);
}
.drop-zone:hover,.drop-zone.over{
  border-color:rgba(99,157,255,0.5);
  background:rgba(20,32,58,0.6);
}
.drop-zone input{position:absolute;inset:0;opacity:0;cursor:pointer}
.drop-icon{font-size:48px;margin-bottom:14px;display:block}
.drop-title{font-family:var(--font-display);font-size:18px;font-weight:600;margin-bottom:8px}
.drop-sub{color:var(--text-sec);font-size:13px;margin-bottom:20px}

.preview-wrap{position:relative;border-radius:var(--r-lg);overflow:hidden;margin-bottom:20px;background:#000}
.preview-img{width:100%;max-height:320px;object-fit:contain;display:block;border-radius:var(--r-lg)}

/* Scanning animation */
.scan-overlay{position:absolute;inset:0;pointer-events:none}
.scan-line{
  position:absolute;left:0;right:0;height:3px;
  background:linear-gradient(90deg,transparent,var(--mint),var(--mint),transparent);
  box-shadow:0 0 20px var(--mint),0 0 40px rgba(0,229,160,0.3);
  animation:scanMove 2s ease-in-out infinite;
}
@keyframes scanMove{0%{top:0;opacity:0}10%{opacity:1}90%{opacity:1}100%{top:100%;opacity:0}}
.scan-corners::before,.scan-corners::after{
  content:'';position:absolute;width:24px;height:24px;border-color:var(--mint);border-style:solid;
}
.scan-corners::before{top:12px;left:12px;border-width:3px 0 0 3px;border-radius:4px 0 0 0}
.scan-corners::after{bottom:12px;right:12px;border-width:0 3px 3px 0;border-radius:0 0 4px 0}
.scan-status{
  position:absolute;bottom:0;left:0;right:0;
  padding:12px 16px;
  background:linear-gradient(to top,rgba(0,0,0,0.8),transparent);
  font-size:13px;font-weight:500;color:var(--mint);
  display:flex;align-items:center;gap:8px;letter-spacing:0.5px;
}
.scan-dots span{animation:dotAnim 1.4s infinite;display:inline-block}
.scan-dots span:nth-child(2){animation-delay:0.2s}
.scan-dots span:nth-child(3){animation-delay:0.4s}
@keyframes dotAnim{0%,60%,100%{transform:translateY(0)}30%{transform:translateY(-4px)}}

.submit-row{display:flex;gap:12px;margin-top:6px}
.outline-btn{
  flex:1;padding:12px 20px;border-radius:11px;
  border:1px solid var(--border-glass);background:transparent;
  color:var(--text-sec);font-family:var(--font-body);font-size:14px;cursor:pointer;
  transition:all 0.2s;
}
.outline-btn:hover{border-color:rgba(99,157,255,0.3);color:var(--text-prime);background:rgba(99,157,255,0.06)}
.submit-btn{
  flex:2;padding:12px 24px;border-radius:11px;border:none;cursor:pointer;
  background:linear-gradient(135deg,var(--mint),rgba(0,180,120,0.85));
  color:#020d08;font-family:var(--font-body);font-size:14px;font-weight:600;
  transition:all 0.2s;display:flex;align-items:center;justify-content:center;gap:8px;
}
.submit-btn:hover:not(:disabled){transform:translateY(-1px);box-shadow:0 8px 24px var(--mint-glow)}
.submit-btn:disabled{opacity:0.6;cursor:not-allowed}

/* Chef */
.chef-wrap{max-width:780px;margin:0 auto}
.chef-header{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:28px;flex-wrap:wrap;gap:16px}
.chef-title{font-family:var(--font-display);font-size:28px;font-weight:700;letter-spacing:-1px;margin-bottom:6px}
.chef-sub{color:var(--text-sec);font-size:14px}

.suggest-btn{
  padding:11px 22px;border-radius:11px;border:1px solid rgba(0,229,160,0.3);
  background:rgba(0,229,160,0.08);color:var(--mint);
  font-family:var(--font-body);font-size:14px;font-weight:500;cursor:pointer;
  display:flex;align-items:center;gap:8px;transition:all 0.2s;white-space:nowrap;
}
.suggest-btn:hover{background:rgba(0,229,160,0.15);box-shadow:0 0 20px rgba(0,229,160,0.15)}
.suggest-btn svg{width:16px;height:16px}

/* Chat */
.chat-container{
  background:var(--bg-glass);border:1px solid var(--border-glass);
  border-radius:var(--r-xl);overflow:hidden;min-height:480px;display:flex;flex-direction:column;
}
.chat-messages{flex:1;overflow-y:auto;padding:20px;display:flex;flex-direction:column;gap:14px;max-height:520px}
.chat-msg{display:flex;gap:10px;animation:fadeSlideIn 0.3s ease}
.chat-msg.user{flex-direction:row-reverse}
.msg-avatar{
  width:30px;height:30px;border-radius:9px;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;font-size:14px;
  background:rgba(99,157,255,0.1);border:1px solid var(--border-glass);
}
.msg-avatar.user-av{background:rgba(0,229,160,0.1);border-color:rgba(0,229,160,0.2)}
.msg-bubble{
  max-width:80%;padding:12px 16px;border-radius:14px;font-size:14px;line-height:1.6;
}
.msg-bubble.ai{background:rgba(13,21,38,0.8);border:1px solid var(--border-glass);color:var(--text-prime)}
.msg-bubble.user-b{background:rgba(0,229,160,0.1);border:1px solid rgba(0,229,160,0.2);color:var(--text-prime)}

/* Markdown in chat */
.msg-bubble h1,.msg-bubble h2,.msg-bubble h3{font-family:var(--font-display);margin:8px 0 4px;font-weight:600}
.msg-bubble h1{font-size:16px}.msg-bubble h2{font-size:15px}.msg-bubble h3{font-size:14px}
.msg-bubble p{margin-bottom:8px}.msg-bubble p:last-child{margin-bottom:0}
.msg-bubble ul,.msg-bubble ol{padding-left:18px;margin-bottom:8px}
.msg-bubble li{margin-bottom:4px}
.msg-bubble strong{color:var(--mint);font-weight:600}
.msg-bubble code{background:rgba(99,157,255,0.1);padding:2px 6px;border-radius:4px;font-size:12px}
.msg-bubble hr{border:none;border-top:1px solid var(--border-glass);margin:10px 0}

.chat-input-row{
  padding:14px 16px;border-top:1px solid var(--border-glass);
  display:flex;gap:10px;align-items:flex-end;background:rgba(8,13,26,0.5);
}
.chat-textarea{
  flex:1;background:rgba(13,21,38,0.7);border:1px solid var(--border-glass);
  color:var(--text-prime);font-family:var(--font-body);font-size:14px;
  padding:11px 14px;border-radius:11px;outline:none;resize:none;
  transition:border-color 0.2s;max-height:120px;min-height:42px;line-height:1.5;
}
.chat-textarea:focus{border-color:rgba(99,157,255,0.3)}
.chat-textarea::placeholder{color:var(--text-muted)}
.send-btn{
  width:42px;height:42px;border-radius:11px;border:none;cursor:pointer;
  background:linear-gradient(135deg,var(--blue),rgba(60,100,200,0.8));
  color:#fff;display:flex;align-items:center;justify-content:center;
  transition:all 0.2s;flex-shrink:0;
}
.send-btn:hover:not(:disabled){transform:scale(1.05);box-shadow:0 4px 16px rgba(99,157,255,0.4)}
.send-btn:disabled{opacity:0.4;cursor:not-allowed}
.send-btn svg{width:16px;height:16px}

/* Recipe suggestion cards */
.recipe-card{
  background:var(--bg-glass);border:1px solid var(--border-glass);
  border-radius:var(--r-lg);padding:18px 20px;
  animation:fadeSlideIn 0.4s ease both;
}
.recipe-card-title{font-family:var(--font-display);font-size:16px;font-weight:600;margin-bottom:8px;color:var(--text-prime)}
.recipe-content{font-size:13px;line-height:1.7;color:var(--text-sec)}
.recipe-content h1,.recipe-content h2,.recipe-content h3{font-family:var(--font-display);color:var(--text-prime);margin:10px 0 6px;font-size:15px}
.recipe-content strong{color:var(--mint)}
.recipe-content ul,.recipe-content ol{padding-left:18px;margin:6px 0}
.recipe-content li{margin-bottom:4px;color:var(--text-sec)}
.recipe-content p{margin-bottom:6px}

/* Skeleton */
.skeleton{
  background:linear-gradient(90deg,rgba(255,255,255,0.03) 25%,rgba(255,255,255,0.07) 50%,rgba(255,255,255,0.03) 75%);
  background-size:200% 100%;
  animation:shimmer 1.5s infinite;border-radius:8px;
}
@keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}

/* Toast */
.toast-container{position:fixed;top:76px;right:20px;z-index:9999;display:flex;flex-direction:column;gap:8px}
.toast{
  display:flex;align-items:center;gap:10px;
  padding:12px 16px;border-radius:12px;
  font-size:13px;font-weight:500;
  backdrop-filter:blur(20px);
  animation:toastIn 0.3s cubic-bezier(0.34,1.56,0.64,1);
  max-width:320px;
}
@keyframes toastIn{from{opacity:0;transform:translateX(20px)}to{opacity:1;transform:none}}
.toast-success{background:rgba(0,229,160,0.12);border:1px solid rgba(0,229,160,0.25);color:var(--mint)}
.toast-error{background:rgba(255,77,109,0.12);border:1px solid rgba(255,77,109,0.25);color:var(--coral)}
.toast-info{background:rgba(99,157,255,0.12);border:1px solid rgba(99,157,255,0.25);color:var(--blue)}
.toast-icon{font-size:16px}

/* Loading spinner */
.spinner{
  width:18px;height:18px;border-radius:50%;
  border:2px solid rgba(0,229,160,0.2);
  border-top-color:var(--mint);
  animation:spin 0.8s linear infinite;
}
@keyframes spin{to{transform:rotate(360deg)}}

/* Stats bar */

.stat-chip{
  padding:8px 16px;border-radius:10px;

/* Camera btn */

  padding:10px 18px;border-radius:10px;
  border:1px solid var(--border-glass);background:rgba(99,157,255,0.06);

/* Progress bar */
.prog-bar{height:4px;border-radius:2px;background:rgba(99,157,255,0.1);overflow:hidden;margin-bottom:24px}

/* Confirm dialog */

  background:var(--bg-surface);border:1px solid var(--border-glass);
  border-radius:var(--r-xl);padding:28px;max-width:360px;width:90%;

}

.confirm-actions{display:flex;gap:10px}
.cancel-btn{flex:1;padding:11px;border-radius:10px;border:1px solid var(--border-glass);background:transparent;color:var(--text-sec);cursor:pointer;font-family:var(--font-body);transition:all 0.2s}
.cancel-btn:hover{color:var(--text-prime);border-color:rgba(99,157,255,0.3)}
.danger-btn{flex:1;padding:11px;border-radius:10px;border:1px solid rgba(255,77,109,0.3);background:rgba(255,77,109,0.1);color:var(--coral);cursor:pointer;font-family:var(--font-body);font-weight:500;transition:all 0.2s}
.danger-btn:hover{background:rgba(255,77,109,0.18)}

/* Mobile nav */
@media(max-width:640px){
  .topbar{padding:0 16px}
  .nav-tabs{display:none}

    position:fixed;bottom:0;left:0;right:0;z-index:100;
    background:rgba(5,8,16,0.92);border-top:1px solid var(--border-glass);
    backdrop-filter:blur(30px);padding:8px 16px 20px;
    display:flex;justify-content:space-around;
  }
  .mob-tab{display:flex;flex-direction:column;align-items:center;gap:4px;border:none;background:none;color:var(--text-muted);cursor:pointer;font-size:10px;font-family:var(--font-body);padding:6px 12px;border-radius:10px;transition:all 0.2s}
  .mob-tab.active{color:var(--mint)}
  .mob-tab svg{width:20px;height:20px}
  .main{padding:20px 16px 100px}
  .item-grid{grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:12px}
}
@media(min-width:641px){.mobile-nav{display:none}}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const {useState,useEffect,useRef,useCallback}=React;
const BASE='http://127.0.0.1:8000/api';

// ── Toast ──────────────────────────────────────────────────────────────────
function useToast(){
  const[toasts,setToasts]=useState([]);
  const add=useCallback((msg,type='info')=>{
    const id=Date.now();
    setToasts(p=>[...p,{id,msg,type}]);
    setTimeout(()=>setToasts(p=>p.filter(t=>t.id!==id)),3400);
  },[]);
  return{toasts,toast:{success:m=>add(m,'success'),error:m=>add(m,'error'),info:m=>add(m,'info')}};
}
function Toasts({toasts}){
  const icons={success:'✓',error:'✕',info:'i'};
  return <div className="toast-container">{toasts.map(t=>(
    <div key={t.id} className={`toast toast-${t.type}`}>
      <span className="toast-icon">{icons[t.type]}</span>{t.msg}
    </div>
  ))}</div>;
}

// ── SVG Icons ──────────────────────────────────────────────────────────────
const Icons={
  fridge:<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect x="4" y="2" width="16" height="20" rx="2"/><path d="M4 10h16"/><path d="M9 6v4"/><path d="M9 14v4"/></svg>,
  camera:<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M14.5 4h-5L7 7H4a2 2 0 0 0-2 2v9a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2V9a2 2 0 0 0-2-2h-3l-2.5-3z"/><circle cx="12" cy="13" r="3"/></svg>,
  chef:<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M6 13.87A4 4 0 0 1 7.41 6a5.11 5.11 0 0 1 1.05-1.54 5 5 0 0 1 7.08 0A5.11 5.11 0 0 1 16.59 6 4 4 0 0 1 18 13.87V21H6Z"/><line x1="6" x2="18" y1="17" y2="17"/></svg>,
  search:<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>,
  trash:<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="3,6 5,6 21,6"/><path d="M19,6l-1,14a2,2,0,0,1-2,2H8a2,2,0,0,1-2-2L5,6"/><path d="M10,11v6"/><path d="M14,11v6"/><path d="M9,6V4a1,1,0,0,1,1-1h4a1,1,0,0,1,1,1V6"/></svg>,
  refresh:<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M3 12a9 9 0 0 1 9-9 9.75 9.75 0 0 1 6.74 2.74L21 8"/><path d="M21 3v5h-5"/><path d="M21 12a9 9 0 0 1-9 9 9.75 9.75 0 0 1-6.74-2.74L3 16"/><path d="M8 16H3v5"/></svg>,
  send:<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22,2 15,22 11,13 2,9"/></svg>,
  spark:<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="m12 3-1.912 5.813a2 2 0 0 1-1.275 1.275L3 12l5.813 1.912a2 2 0 0 1 1.275 1.275L12 21l1.912-5.813a2 2 0 0 1 1.275-1.275L21 12l-5.813-1.912a2 2 0 0 1-1.275-1.275L12 3Z"/></svg>,
  upload:<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>,
};

// ── Expiry helpers ──────────────────────────────────────────────────────────
function daysLeft(dateStr){
  if(!dateStr)return null;
  const exp=new Date(dateStr);exp.setHours(23,59,59,999);
  return Math.ceil((exp-new Date())/86400000);
}
function expiryBadge(days){
  if(days===null)return{cls:'badge-warn',label:'No expiry'};
  if(days<=0)return{cls:'badge-critical',label:'Expired'};
  if(days===1)return{cls:'badge-critical',label:'1 day'};
  if(days<=2)return{cls:'badge-critical',label:`${days}d left`};
  if(days<=5)return{cls:'badge-warn',label:`${days}d left`};
  return{cls:'badge-fresh',label:`${days}d left`};
}
function formatExpiryDate(dateStr){
  if(!dateStr)return'Expiry date not detected';
  const d=new Date(dateStr);
  if(Number.isNaN(d.getTime()))return'Expiry date not detected';
  return `Expires ${d.toLocaleDateString(undefined,{day:'2-digit',month:'short',year:'numeric'})}`;
}
function emojiFor(name=''){
  const n=name.toLowerCase();
  if(n.includes('apple')||n.includes('fruit'))return'🍎';
  if(n.includes('milk'))return'🥛';
  if(n.includes('egg'))return'🥚';
  if(n.includes('bread'))return'🍞';
  if(n.includes('cheese'))return'🧀';
  if(n.includes('chicken')||n.includes('meat'))return'🍗';
  if(n.includes('fish'))return'🐟';
  if(n.includes('vegetable')||n.includes('carrot'))return'🥕';
  if(n.includes('berry')||n.includes('straw'))return'🍓';
  if(n.includes('juice'))return'🧃';
  if(n.includes('yogurt'))return'🥣';
  return'🧊';
}

// ── Mock data (shown when backend is offline) ───────────────────────────────
const MOCK_ITEMS=[
  {id:1,name:'Organic Milk',quantity:2,expiryDate:new Date(Date.now()+86400000*2).toISOString(),imageUrl:null},
  {id:2,name:'Free-Range Eggs',quantity:6,expiryDate:new Date(Date.now()+86400000*8).toISOString(),imageUrl:null},
  {id:3,name:'Sourdough Bread',quantity:1,expiryDate:new Date(Date.now()+86400000*1).toISOString(),imageUrl:null},
  {id:4,name:'Greek Yogurt',quantity:3,expiryDate:new Date(Date.now()+86400000*5).toISOString(),imageUrl:null},
  {id:5,name:'Cheddar Cheese',quantity:1,expiryDate:new Date(Date.now()-86400000).toISOString(),imageUrl:null},
  {id:6,name:'Strawberries',quantity:1,expiryDate:new Date(Date.now()+86400000*3).toISOString(),imageUrl:null},
];

// ── API layer ───────────────────────────────────────────────────────────────
async function apiFetch(url,opts={}){
  const res=await fetch(BASE+url,{...opts,headers:{'Content-Type':'application/json',...opts.headers}});
  if(!res.ok){
    const data=await res.json().catch(()=>({}));
    throw new Error(data.detail||data.error||`HTTP ${res.status}`);
  }
  return res.json();
}

// ── useInventory hook ───────────────────────────────────────────────────────
function useInventory(toast){
  const[items,setItems]=useState([]);
  const[loading,setLoading]=useState(true);
  const[offline,setOffline]=useState(false);

  const fetchItems=useCallback(async(sort='expiry')=>{
    setLoading(true);
    try{
      const data=await apiFetch(`/items/all?sortBy=${sort}`);
      setItems(Array.isArray(data)?data:data.items||[]);
      setOffline(false);
    }catch{
      setOffline(true);
      setItems(MOCK_ITEMS);
      toast.info('Backend offline — showing demo data');
    }finally{setLoading(false);}
  },[]);

  const updateQty=async(id,qty)=>{
    const nextQty=Math.max(0,qty);
    if(offline){setItems(p=>p.map(i=>i.id===id?{...i,quantity:nextQty}:i));return;}
    try{
      const res=await fetch(`${BASE}/items/${id}`,{method:'PATCH',headers:{'Content-Type':'application/json'},body:JSON.stringify({quantity:nextQty})});
      if(!res.ok)throw new Error(`HTTP ${res.status}`);
      setItems(p=>p.map(i=>i.id===id?{...i,quantity:nextQty}:i));
    }catch{toast.error('Failed to update quantity');}
  };

  const deleteItem=async(id)=>{
    if(offline){setItems(p=>p.filter(i=>i.id!==id));return;}
    try{
      const res=await fetch(`${BASE}/items/${id}`,{method:'DELETE'});
      if(!res.ok)throw new Error(`HTTP ${res.status}`);
      setItems(p=>p.filter(i=>i.id!==id));
      toast.success('Item removed from fridge');
    }catch{toast.error('Failed to delete item');}
  };

  useEffect(()=>{fetchItems();},[]);
  return{items,loading,offline,fetchItems,updateQty,deleteItem};
}

// ── Confirm Dialog ─────────────────────────────────────────────────────────
function Confirm({title,sub,onConfirm,onCancel}){
  return <div className="confirm-overlay" onClick={e=>{if(e.target===e.currentTarget)onCancel()}}>
    <div className="confirm-box">
      <div className="confirm-title">{title}</div>
      <div className="confirm-sub">{sub}</div>
      <div className="confirm-actions">
        <button className="cancel-btn" onClick={onCancel}>Cancel</button>
        <button className="danger-btn" onClick={onConfirm}>Remove</button>
      </div>
    </div>
  </div>;
}

// ── Item Card ──────────────────────────────────────────────────────────────
function ItemCard({item,onUpdateQty,onDelete,delay=0}){
  const days=daysLeft(item.expiryDate);
  const{cls,label}=expiryBadge(days);
  const[confirming,setConfirming]=useState(false);
  return <>
    <div className="item-card" style={{animationDelay:`${delay}ms`}}>
      {item.imageUrl
        ?<img className="card-img" src={item.imageUrl} alt={item.name} onError={e=>{e.target.style.display='none';e.target.nextSibling.style.display='flex'}}/>
        :null}
      <div className="card-img-fallback" style={{display:item.imageUrl?'none':'flex'}}>
        {emojiFor(item.name)}
      </div>
      <div className="card-body">
        <div className="card-name" title={item.name}>
          {item.name.charAt(0).toUpperCase()+item.name.slice(1).toLowerCase()}
        </div>
        <div className="card-meta">
          <span className={`expiry-badge ${cls}`}>
            <span className="badge-dot"/>
            {label}
          </span>
          <div className="qty-controls">
            <button className="qty-btn" onClick={()=>onUpdateQty(item.id,Math.max(0,item.quantity-1))}>−</button>
            <span className="qty-val">{item.quantity}</span>
            <button className="qty-btn" onClick={()=>onUpdateQty(item.id,item.quantity+1)}>+</button>
          </div>
        </div>
        <div className="expiry-date">{formatExpiryDate(item.expiryDate)}</div>
        <div style={{display:'flex',justifyContent:'flex-end'}}>
          <button className="del-btn" onClick={()=>setConfirming(true)}>{Icons.trash}</button>
        </div>
      </div>
    </div>
    {confirming&&<Confirm
      title="Remove item?"
      sub={`Remove "${item.name}" from your fridge?`}
      onConfirm={()=>{setConfirming(false);onDelete(item.id);}}
      onCancel={()=>setConfirming(false)}
    />}
  </>;
}

// ── Skeleton Card ──────────────────────────────────────────────────────────
function SkeletonCard(){
  return <div className="item-card">
    <div className="skeleton" style={{height:130}}/>
    <div style={{padding:14}}>
      <div className="skeleton" style={{height:16,marginBottom:12,width:'70%'}}/>
      <div style={{display:'flex',gap:8,marginBottom:12}}>
        <div className="skeleton" style={{height:22,width:70,borderRadius:11}}/>
        <div className="skeleton" style={{height:22,width:80,borderRadius:11,marginLeft:'auto'}}/>
      </div>
      <div className="skeleton" style={{height:22,width:30,marginLeft:'auto'}}/>
    </div>
  </div>;
}

// ── Inventory View ─────────────────────────────────────────────────────────
function InventoryView({toast,onNav}){
  const{items,loading,offline,fetchItems,updateQty,deleteItem}=useInventory(toast);
  const[search,setSearch]=useState('');
  const[sort,setSort]=useState('expiry');
  const[refreshing,setRefreshing]=useState(false);

  const doRefresh=async()=>{
    setRefreshing(true);
    await fetchItems(sort);
    setRefreshing(false);
  };

  const filtered=items.filter(i=>(i.name||'').toLowerCase().includes(search.toLowerCase()));
  const fresh=items.filter(i=>daysLeft(i.expiryDate)>5).length;
  const warn=items.filter(i=>{const d=daysLeft(i.expiryDate);return d!==null&&d>0&&d<=5;}).length;
  const exp=items.filter(i=>{const d=daysLeft(i.expiryDate);return d!==null&&d<=0;}).length;

  return <div>
    <div className="inv-header">
      <div>
        <div className="inv-title">Your Fridge<span> ❄</span></div>
        {offline&&<div style={{fontSize:12,color:'var(--amber)',marginTop:4}}>⚡ Demo mode — connect your backend to sync</div>}
      </div>
      <div className="controls">
        <div className="search-wrap">
          {Icons.search}
          <input className="search-input" placeholder="Search items…" value={search} onChange={e=>setSearch(e.target.value)}/>
        </div>
        <select className="sort-select" value={sort} onChange={e=>{setSort(e.target.value);fetchItems(e.target.value);}}>
          <option value="expiry">Expiry (Soonest)</option>
          <option value="name">Name (A–Z)</option>
          <option value="createdAt">Recently Added</option>
        </select>
        <button className="refresh-btn" onClick={doRefresh} disabled={refreshing}>
          <span style={{display:'inline-block',animation:refreshing?'spin 0.8s linear infinite':'none'}}>{Icons.refresh}</span>
          Refresh
        </button>
      </div>
    </div>

    {!loading&&items.length>0&&<div className="stats-bar">
      <div className="stat-chip"><span className="stat-num mint">{fresh}</span><span style={{color:'var(--text-sec)',fontSize:13}}>Fresh</span></div>
      <div className="stat-chip"><span className="stat-num amber">{warn}</span><span style={{color:'var(--text-sec)',fontSize:13}}>Expiring Soon</span></div>
      <div className="stat-chip"><span className="stat-num coral">{exp}</span><span style={{color:'var(--text-sec)',fontSize:13}}>Expired</span></div>
      <div className="stat-chip"><span className="stat-num" style={{color:'var(--blue)'}}>{items.length}</span><span style={{color:'var(--text-sec)',fontSize:13}}>Total Items</span></div>
    </div>}

    {loading
      ?<div className="item-grid">{Array.from({length:6}).map((_,i)=><SkeletonCard key={i}/>)}</div>
      :filtered.length===0
        ?<div className="empty-state">
          <div className="empty-icon">🧊</div>
          <div className="empty-title">{search?'No items found':'Your fridge is empty'}</div>
          <div className="empty-sub">{search?'Try a different search term.':'Scan your groceries to start tracking expiry dates and reducing waste.'}</div>
          {!search&&<button className="primary-btn" onClick={()=>onNav('scan')}>Scan Your First Item →</button>}
        </div>
        :<div className="item-grid">
          {filtered.map((item,i)=><ItemCard key={item.id} item={item} onUpdateQty={updateQty} onDelete={deleteItem} delay={i*60}/>)}
        </div>
    }
  </div>;
}

// ── Scanner View ───────────────────────────────────────────────────────────
function ScannerView({toast,onNav}){
  const[file,setFile]=useState(null);
  const[preview,setPreview]=useState(null);
  const[scanning,setScanning]=useState(false);
  const[over,setOver]=useState(false);
  const[progress,setProgress]=useState(0);
  const inputRef=useRef();
  const camRef=useRef();
  const timerRef=useRef();

  const handleFile=f=>{
    if(!f)return;
    setFile(f);
    const url=URL.createObjectURL(f);
    setPreview(url);
  };

  const handleDrop=e=>{e.preventDefault();setOver(false);handleFile(e.dataTransfer.files[0]);};

  const handleSubmit=async()=>{
    if(!file)return;
    setScanning(true);setProgress(10);
    timerRef.current=setInterval(()=>setProgress(p=>Math.min(p+Math.random()*15,90)),600);
    try{
      const fd=new FormData();fd.append('file',file);
      const res=await fetch(`${BASE}/ocr/scan`,{method:'POST',body:fd});
      clearInterval(timerRef.current);
      if(res.ok){
        setProgress(100);
        toast.success('Item scanned & added to fridge!');
        setTimeout(()=>onNav('inventory'),800);
      }else{
        const err=await res.json().catch(()=>({}));
        toast.error(err.detail||`Scan failed (${res.status})`);
        setScanning(false);setProgress(0);
      }
    }catch{
      clearInterval(timerRef.current);
      toast.error('Could not reach backend — check it\'s running on :8000');
      setScanning(false);setProgress(0);
    }
  };

  const reset=()=>{setFile(null);setPreview(null);setScanning(false);setProgress(0);};

  return <div className="scanner-wrap">
    <div className="scanner-title">Smart Scanner</div>
    <div className="scanner-sub">Upload an image — YOLO + OCR will detect items & read expiry dates automatically.</div>

    {progress>0&&<div className="prog-bar"><div className="prog-fill" style={{width:`${progress}%`}}/></div>}

    {!preview
      ?<div className={`drop-zone${over?' over':''}`}
          onDragOver={e=>{e.preventDefault();setOver(true);}}
          onDragLeave={()=>setOver(false)}
          onDrop={handleDrop}>
          <input ref={inputRef} type="file" accept="image/*" onChange={e=>handleFile(e.target.files[0])}/>
          <input ref={camRef} type="file" accept="image/*" capture="environment" style={{display:'none'}} onChange={e=>handleFile(e.target.files[0])}/>
          <span className="drop-icon">📷</span>
          <div className="drop-title">Drop your fridge photo here</div>
          <div className="drop-sub">or click to browse · PNG, JPG, WEBP</div>
          <button className="cam-btn" onClick={e=>{e.stopPropagation();camRef.current.click();}}>
            {Icons.camera} Use Camera
          </button>
        </div>
      :<div>
        <div className="preview-wrap">
          <img className="preview-img" src={preview} alt="Preview"/>
          {scanning&&<div className="scan-overlay scan-corners">
            <div className="scan-line"/>
            <div className="scan-status">
              <div className="spinner"/>
              AI SCANNING
              <span className="scan-dots"><span>.</span><span>.</span><span>.</span></span>
            </div>
          </div>}
        </div>
        <div className="submit-row">
          {!scanning&&<button className="outline-btn" onClick={reset}>Choose Different</button>}
          <button className="submit-btn" onClick={handleSubmit} disabled={scanning}>
            {scanning?<><div className="spinner"/>Analyzing with YOLO + OCR…</>:<>{Icons.upload} Scan This Image</>}
          </button>
        </div>
      </div>
    }

    <div style={{marginTop:28,padding:'18px 20px',borderRadius:14,background:'rgba(99,157,255,0.05)',border:'1px solid rgba(99,157,255,0.1)'}}>
      <div style={{fontSize:13,fontWeight:600,color:'var(--blue)',marginBottom:8,fontFamily:'var(--font-display)'}}>How it works</div>
      <div style={{display:'flex',flexDirection:'column',gap:8}}>
        {[['🔍','YOLOv8 Detection','Detects grocery items with bounding boxes in milliseconds'],
          ['📖','OCR Expiry Reading','Google Vision or PaddleOCR reads dates from packaging text'],
          ['🧠','Gemini AI','Categorises, names, and adds items to your fridge inventory']
        ].map(([e,t,d])=><div key={t} style={{display:'flex',gap:12,alignItems:'flex-start'}}>
          <span style={{fontSize:16,flexShrink:0,marginTop:1}}>{e}</span>
          <div><div style={{fontSize:13,fontWeight:500,color:'var(--text-prime)',marginBottom:2}}>{t}</div>
          <div style={{fontSize:12,color:'var(--text-muted)'}}>{d}</div></div>
        </div>)}
      </div>
    </div>
  </div>;
}

// ── Chef View ──────────────────────────────────────────────────────────────
function ChefView({toast}){
  const[recipes,setRecipes]=useState(null);
  const[loadingRec,setLoadingRec]=useState(false);
  const[messages,setMessages]=useState([
    {role:'ai',content:'## Hello, Chef! 👨‍🍳\nI\'m your **Zero-Waste AI Chef**. Ask me anything about using up your fridge ingredients — from quick weeknight dinners to gourmet meals. Or hit **Suggest Recipes** to see what I can make with your current inventory!'}
  ]);
  const[input,setInput]=useState('');
  const[thinking,setThinking]=useState(false);
  const chatEndRef=useRef();

  useEffect(()=>{chatEndRef.current?.scrollIntoView({behavior:'smooth'});},[messages,thinking]);

  const suggestRecipes=async()=>{
    setLoadingRec(true);setRecipes(null);
    try{
      const data=await apiFetch('/recipes/suggest');
      if(typeof data.recipes_markdown==='string'){
        setRecipes([{title:'Recipe Suggestions',content:data.recipes_markdown}]);
      }else if(typeof data.recipes==='string'){
        setRecipes([{title:'Recipe Suggestions',content:data.recipes}]);
      }else{
        setRecipes(data.recipes||data||[]);
      }
    }catch(err){
      toast.error(err.message||'Recipe suggestion failed');
      setRecipes([{title:'Recipe generation unavailable',content:err.message||'Check backend Gemini configuration.'}]);
    }finally{setLoadingRec(false);}
  };

  const sendMsg=async()=>{
    const q=input.trim();if(!q||thinking)return;
    setInput('');
    setMessages(p=>[...p,{role:'user',content:q}]);
    setThinking(true);
    try{
      const data=await fetch(`${BASE}/recipes/ask`,{
        method:'POST',headers:{'Content-Type':'application/json'},
        body:JSON.stringify({question:q})
      }).then(r=>r.json());
      const ans=data.answer||data.response||data.content||'No response received.';
      setMessages(p=>[...p,{role:'ai',content:ans}]);
    }catch{
      setMessages(p=>[...p,{role:'ai',content:'⚠️ **Backend error** — please ensure your API is running at `localhost:8000` and the Gemini key is configured.'}]);
    }finally{setThinking(false);}
  };

  const renderMd=md=>{
    try{return{__html:marked.parse(md||'')};}
    catch{return{__html:md||''};}
  };

  return <div className="chef-wrap">
    <div className="chef-header">
      <div>
        <div className="chef-title">Zero-Waste Chef</div>
        <div className="chef-sub">AI-powered recipes from your fridge inventory</div>
      </div>
      <button className="suggest-btn" onClick={suggestRecipes} disabled={loadingRec}>
        {loadingRec?<div className="spinner"/>:Icons.spark}
        {loadingRec?'Generating…':'Suggest Recipes'}
      </button>
    </div>

    {/* Recipe suggestions */}
    {loadingRec&&<div style={{display:'grid',gap:12,marginBottom:24}}>
      {[1,2,3].map(i=><div key={i} className="recipe-card">
        <div className="skeleton" style={{height:16,width:'40%',marginBottom:10}}/>
        <div className="skeleton" style={{height:13,width:'90%',marginBottom:6}}/>
        <div className="skeleton" style={{height:13,width:'70%'}}/>
      </div>)}
    </div>}
    {recipes&&!loadingRec&&<div style={{display:'grid',gap:12,marginBottom:24}}>
      {(Array.isArray(recipes)?recipes:[recipes]).map((r,i)=>(
        <div key={i} className="recipe-card" style={{animationDelay:`${i*100}ms`}}>
          {r.title&&<div className="recipe-card-title">🍽 {r.title}</div>}
          <div className="recipe-content" dangerouslySetInnerHTML={renderMd(r.content||r.text||r)}/>
        </div>
      ))}
    </div>}

    {/* Chat */}
    <div className="chat-container">
      <div className="chat-messages">
        {messages.map((m,i)=>(
          <div key={i} className={`chat-msg${m.role==='user'?' user':''}`}>
            <div className={`msg-avatar${m.role==='user'?' user-av':''}`}>{m.role==='user'?'👤':'🤖'}</div>
            <div className={`msg-bubble${m.role==='user'?' user-b':' ai'}`}>
              <div dangerouslySetInnerHTML={renderMd(m.content)}/>
            </div>
          </div>
        ))}
        {thinking&&<div className="chat-msg">
          <div className="msg-avatar">🤖</div>
          <div className="msg-bubble ai" style={{display:'flex',gap:6,alignItems:'center'}}>
            <div className="spinner" style={{width:14,height:14,borderWidth:2}}/>
            <span style={{color:'var(--text-sec)',fontSize:13}}>Gemini is thinking…</span>
          </div>
        </div>}
        <div ref={chatEndRef}/>
      </div>
      <div className="chat-input-row">
        <textarea
          className="chat-textarea"
          placeholder="Ask anything — 'What can I make with eggs and cheese?' …"
          value={input}
          onChange={e=>setInput(e.target.value)}
          onKeyDown={e=>{if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendMsg();}}}
          rows={1}
        />
        <button className="send-btn" onClick={sendMsg} disabled={!input.trim()||thinking}>{Icons.send}</button>
      </div>
    </div>

    <div style={{marginTop:16,fontSize:12,color:'var(--text-muted)',textAlign:'center'}}>
      Powered by Google Gemini · Shift+Enter for new line · Enter to send
    </div>
  </div>;
}

// ── App Shell ──────────────────────────────────────────────────────────────
function App(){
  const[tab,setTab]=useState('inventory');
  const{toasts,toast}=useToast();

  const navTo=t=>setTab(t);

  const tabs=[
    {id:'inventory',label:'Inventory',icon:Icons.fridge},
    {id:'scan',label:'Scan Item',icon:Icons.camera},
    {id:'chef',label:'Zero-Waste Chef',icon:Icons.chef},
  ];

  return <div className="app-shell">
    <div className="orb orb-1"/><div className="orb orb-2"/><div className="orb orb-3"/>

    <nav className="topbar">
      <div className="logo">
        <div className="logo-icon">❄</div>
        <span>SmartFridge</span>
      </div>
      <div className="nav-tabs">
        {tabs.map(t=><button key={t.id} className={`nav-tab${tab===t.id?' active':''}`} onClick={()=>setTab(t.id)}>
          {t.icon}{t.label}
        </button>)}
      </div>
    </nav>

    <main className="main">
      {tab==='inventory'&&<InventoryView toast={toast} onNav={navTo}/>}
      {tab==='scan'&&<ScannerView toast={toast} onNav={navTo}/>}
      {tab==='chef'&&<ChefView toast={toast}/>}
    </main>

    {/* Mobile bottom nav */}
    <nav className="mobile-nav">
      {tabs.map(t=><button key={t.id} className={`mob-tab${tab===t.id?' active':''}`} onClick={()=>setTab(t.id)}>
        {t.icon}<span>{t.label.split(' ')[0]}</span>
      </button>)}
    </nav>

    <Toasts toasts={toasts}/>
  </div>;
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
